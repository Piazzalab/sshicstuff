[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sshicstuff"
version = "2.0.0"
description = "A package to analyze data generated by Hi-C Capture for ssDNA, extending the HiCstuff package"
dynamic = ["dependencies"]
readme = "README.md"
license = "GPL-3.0-only"
authors = [
    {name = "Nicolas Mendiboure", email = "nicolas.mendiboure@ens-lyon.fr"},
    {name = "Aurèle Piazza", email = "aurele.piazza@ens-lyon.fr"}
]
classifiers = [
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Operating System :: Unix",
    "Operating System :: Linux",
    "Operating System :: MacOS"
]
requires-python = "~=3.12"

[project.urls]
Homepage = "https://github.com/Piazzalab/sshicstuff"

[project.scripts]
sshicstuff = "sshicstuff.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
dependencies = {file = "requirements.txt"}