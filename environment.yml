name: sshicstuff_env
channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.12.7
  - pip=24.3.1

  # Bioinformatics tools
  - bowtie2=2.5.4
  - cooler=0.10.2
  - minimap2=2.28
  - pairtools=1.1.0
  - pysam=0.22.1
  - samtools=1.21
  - seqtk=1.4

  # Build tools
  - python-build=1.2.2.post1

  # Python dependencies (pip)
  - pip:
      - -e .